server:
  addr: 127.0.0.1:8000
  camera_dir: "/home/aloha/machbase/neo-blackbox/tmp/cameras"
  mvs_dir: "/home/aloha/machbase/neo-blackbox/tmp/mvs"
  data_dir: "/home/aloha/machbase/neo-blackbox/tmp/data"

machbase:
  host: 127.0.0.1
  port: 5654
  timeout_seconds: 30

ffmpeg:
  binary: "/home/aloha/machbase/neo-blackbox/ffmpeg"

  defaults:
    input_args:
    output_args:

    probe_binary: "/home/aloha/machbase/neo-blackbox/ffprobe"
    probe_args:
      - flag: v
        value: "error"
      - flag: select_streams
        value: "v:0"
      - flag: show_entries
        value: "packet=pts_time,duration_time"
      - flag: of
        value: "csv=p=0"

# 로그 설정 (logrus + lumberjack)
log:
  level: "info"  # debug, info, warn, error, fatal, panic
  format: "json"  # json or text
  output: "file"  # stdout, file, both
  file:
    filename: "/home/aloha/machbase/neo-blackbox/logs/blackbox.log"
    max_size: 100      # MB
    max_backups: 10    # 백업 파일 개수
    max_age: 30        # days
    compress: true     # 압축 여부

    probe_binary: "ffprobe"  # Uses system ffprobe on macOS
    probe_args:
      - flag: v
        value: "error"
      - flag: select_streams
        value: "v:0"
      - flag: show_entries
        value: "packet=pts_time,duration_time"
      - flag: of
        value: "csv=p=0"

  cameras:
    - id: camera1
      rtsp_url: rtsp://210.99.70.120:1935/live/cctv002.stream
      output_dir: ./tmp/data/camera1/in
      output_name: manifest.mpd
      input_args:
        - flag: rtsp_transport
          value: "tcp"
        - flag: rtsp_flags
          value: "prefer_tcp"
        - flag: buffer_size
          value: "10485760"
        - flag: max_delay
          value: "5000000"
        - flag: probesize
          value: "10000000"
        - flag: analyzeduration
          value: "10000000"
        - flag: use_wallclock_as_timestamps
          value: "1"
      mid_args:
        - flag: c:v
          value: "copy"
      output_args:
        - flag: f
          value: dash
        - flag: seg_duration
          value: "5"
        - flag: use_template
          value: "0"
        - flag: use_timeline
          value: "0"
      extra_args: []
