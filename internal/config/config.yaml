server:
  addr: 127.0.0.1:8000
  camera_dir: "/home/aloha/machbase/blackbox-backend/tmp/cameras"
  mvs_dir: "/home/aloha/machbase/blackbox-backend/tmp/mvs"
  data_dir: "/home/aloha/machbase/blackbox-backend/tmp/data"

machbase:
  host: 127.0.0.1
  port: 5654

mediamtx:
  host: 127.0.0.1
  port: 9997  # MediaMTX HTTP API 포트

ffmpeg:
  binary: "/home/aloha/machbase/blackbox-backend/ffmpeg"

  defaults:
    probe_binary: "/home/aloha/machbase/blackbox-backend/ffprobe"
    probe_args:
      - flag: v
        value: "error"
      - flag: select_streams
        value: "v:0"
      - flag: show_entries
        value: "packet=pts_time,duration_time"
      - flag: of
        value: "csv=p=0"

# 로그 설정 (logrus + lumberjack)
log:
  level: "info"  # debug, info, warn, error, fatal, panic
  format: "json"  # json or text
  output: "both"  # stdout, file, both
  file:
    filename: "/home/aloha/machbase/blackbox-backend/logs/blackbox.log"
    max_size: 100      # MB
    max_backups: 10    # 백업 파일 개수
    max_age: 30        # days
    compress: true     # 압축 여부
